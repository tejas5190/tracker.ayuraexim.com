<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayura Exim | Prosperity Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --growth-green: #15803d;
            --prosperity-gold: #fbbf24;
            --energy-orange: #f97316;
            --glass-bg: rgba(255, 255, 255, 0.78); 
            --text-dark: #0f172a;
        }

        body { 
            background: url('bg-farm.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif; 
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .floating-item {
            position: absolute; font-size: 2.5rem; opacity: 0.25;
            animation: floatUp 15s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .main-container { max-width: 900px; margin: auto; padding-top: 20px; }

        .branding-hero {
            text-align: center; margin-bottom: 30px; animation: bounceIn 1.2s ease;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(8px);
            padding: 20px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.4);
        }

        .branding-hero h1 {
            font-weight: 800; font-size: 4.5rem; color: #fff;
            text-shadow: 3px 3px 0px var(--growth-green), 5px 5px 15px rgba(0,0,0,0.6);
            margin-bottom: 5px;
        }

        .branding-hero p {
            font-weight: 800; color: #fff; background: var(--energy-orange);
            display: inline-block; padding: 8px 25px; border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .vibrant-card {
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border-radius: 35px; padding: 35px; margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255,255,255,0.6); transition: 0.4s;
        }

        .vibrant-card:hover { border-color: var(--prosperity-gold); transform: translateY(-5px); }

        .step-badge {
            display: inline-block; padding: 10px 25px; border-radius: 50px;
            font-weight: 800; color: white; margin-bottom: 20px;
        }

        .bg-blue { background: linear-gradient(45deg, #2563eb, #3b82f6); }
        .bg-purple { background: linear-gradient(45deg, #7c3aed, #a855f7); }
        .bg-pink { background: linear-gradient(45deg, #db2777, #ec4899); }
        .bg-amber { background: linear-gradient(45deg, #d97706, #f59e0b); }
        .bg-red { background: linear-gradient(45deg, #dc2626, #ef4444); }

        .form-control, .form-select { 
            border: 2px solid #cbd5e1; border-radius: 15px; padding: 12px; 
            font-weight: 600; background: rgba(255,255,255,0.9); 
        }

        .profile-label {
            padding: 12px 20px; border-radius: 50px; border: 2px solid #cbd5e1;
            cursor: pointer; font-weight: 800; transition: 0.3s; background: rgba(255,255,255,0.9);
        }
        .chk-active:checked + .profile-label { background: var(--growth-green); color: white; border-color: var(--prosperity-gold); }

        .btn-success-sync {
            background: linear-gradient(45deg, #15803d, #22c55e); color: white; font-weight: 800;
            font-size: 1.8rem; padding: 25px; border-radius: 30px; width: 100%; border: none;
            box-shadow: 0 20px 40px rgba(21, 128, 61, 0.6); animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 10px 20px rgba(21, 128, 61, 0.5); }
            50% { box-shadow: 0 20px 50px rgba(21, 128, 61, 0.8); }
            100% { box-shadow: 0 10px 20px rgba(21, 128, 61, 0.5); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3) translateY(-100px); }
            70% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-animation" id="bg-items"></div>

<div class="main-container">
    <div class="branding-hero">
        <h1>AYURA EXIM</h1>
        <p>🚜 SOURCING INTELLIGENCE 🚜</p>
    </div>

    <form id="sourcingForm">
        <!-- 01. Identity -->
        <div class="vibrant-card">
            <span class="step-badge bg-blue">01. MILL IDENTITY</span>
            <div class="row g-4">
                <div class="col-md-7">
                    <label class="form-label fw-bold">Dal Mill Name</label>
                    <input type="text" name="millName" class="form-control" placeholder="Enter Full Name..." required>
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-bold">WhatsApp Number</label>
                    <input type="tel" name="whatsapp" class="form-control" placeholder="+91" required>
                </div>
            </div>
            <div class="mt-4">
                <label class="form-label fw-bold text-dark mb-2">SOURCING PROFILE</label>
                <div class="d-flex flex-wrap gap-2">
                    <input type="checkbox" id="chkImported" class="d-none chk-active">
                    <label for="chkImported" class="profile-label">🌍 Deals in Imported</label>
                    <input type="checkbox" id="chkBuyUs" name="buyFromUs" class="d-none chk-active">
                    <label for="chkBuyUs" class="profile-label">🤝 Buy From Us</label>
                </div>
            </div>
        </div>

        <!-- 02. Market Intel -->
        <div class="vibrant-card">
            <span class="step-badge bg-purple">02. MARKET INTELLIGENCE & RATES</span>
            <p class="text-dark small fw-bold mb-3">Select commodities to enter Rates:</p>
            <div class="text-center d-flex flex-wrap justify-content-center">
                <input type="checkbox" class="p-check d-none p-opt" id="tur" value="tur">
                <label class="profile-label m-1" for="tur">Tur</label>
                <input type="checkbox" class="p-check d-none p-opt" id="chana" value="chana">
                <label class="profile-label m-1" for="chana">Chana</label>
                <input type="checkbox" class="p-check d-none p-opt" id="moong" value="moong">
                <label class="profile-label m-1" for="moong">Moong</label>
                <input type="checkbox" class="p-check d-none p-opt" id="urad" value="urad">
                <label class="profile-label m-1" for="urad">Urad</label>
            </div>
            <div id="rateInputsContainer"></div>
        </div>

        <!-- 03. Logistics -->
        <div class="vibrant-card">
            <span class="step-badge bg-pink">03. RAW MATERIAL LOGISTICS</span>
            <div class="row g-4">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Origin Country</label>
                    <input type="text" name="country" class="form-control" placeholder="e.g. India">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">State / Region</label>
                    <input type="text" name="state" class="form-control" placeholder="e.g. Maharashtra">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Procurement (MT)</label>
                    <input type="number" name="monthlyReq" class="form-control">
                </div>
            </div>
        </div>

        <!-- 04. Status -->
        <div class="vibrant-card">
            <span class="step-badge bg-red">04. ACTION & STATUS</span>
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Current Status</label>
                    <select name="status" class="form-select">
                        <option value="New Lead">🔥 New Lead</option>
                        <option value="In Discussion">⏳ In Discussion</option>
                        <option value="Closed">✅ Closed</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Follow-up Date</label>
                    <input type="date" name="followUpDate" class="form-control">
                </div>
                <div class="col-12">
                    <textarea name="remarks" class="form-control" rows="3" placeholder="Add conversation details..."></textarea>
                </div>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-success-sync">🚀 SYNC PROSPERITY</button>
    </form>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbzg3lDLkTtQp8dcRYLmdohne_EFxU1ft1ofM-_wmt_Tf4_KLLsd88LITZFE4r9qwcc4/exec";

    // Dynamic Background Icons
    const icons = ['🌾', '🚜', '💰', '🏗️', '🌱'];
    const bg = document.getElementById('bg-items');
    for(let i=0; i<15; i++) {
        let span = document.createElement('span');
        span.className = 'floating-item';
        span.innerText = icons[Math.floor(Math.random()*icons.length)];
        span.style.left = Math.random()*100 + '%';
        span.style.animationDelay = Math.random()*15 + 's';
        bg.appendChild(span);
    }

    // Dynamic Rate Inputs
    document.querySelectorAll('.p-opt').forEach(cb => {
        cb.addEventListener('change', () => {
            const container = document.getElementById('rateInputsContainer');
            container.innerHTML = "";
            document.querySelectorAll('.p-opt:checked').forEach(checked => {
                const val = checked.value; 
                const div = document.createElement('div');
                div.className = "p-3 rounded-4 row g-3 mt-3 border border-success bg-white";
                div.innerHTML = `
                    <div class="col-12"><h6 class="fw-bold text-success">${val.toUpperCase()} Rates</h6></div>
                    <div class="col-6"><label class="small fw-bold">Retail Dal (₹)</label><input type="number" name="${val}Dal" class="form-control"></div>
                    <div class="col-6"><label class="small fw-bold">Whole Raw (₹)</label><input type="number" name="${val}Whole" class="form-control"></div>
                `;
                container.appendChild(div);
            });
        });
    });

    document.getElementById('sourcingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "🚀 SYNCING...";

        fetch(APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(Object.fromEntries(new FormData(this))) })
        .then(() => {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#15803d', '#fbbf24'] });
            alert("✅ Synced Successfully!");
            this.reset();
            document.getElementById('rateInputsContainer').innerHTML = "";
        }).finally(() => {
            btn.disabled = false; btn.innerText = "🚀 SYNC PROSPERITY";
        });
    });
</script>
</body>
</html>
