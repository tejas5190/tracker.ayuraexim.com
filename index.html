<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayura Exim | Prosperity Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --growth-green: #15803d;
            --prosperity-gold: #fbbf24;
            --energy-orange: #f97316;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --text-dark: #0f172a;
        }

        body { 
            background: url('https://static.vecteezy.com/system/resources/previews/029/300/314/large_2x/tractor-spraying-pesticides-on-soybean-field-with-sprayer-at-spring-free-photo.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif; 
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .floating-item {
            position: absolute; font-size: 2.5rem; opacity: 0.2;
            animation: floatUp 15s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .main-container { max-width: 900px; margin: auto; padding-top: 20px; }

        .branding-hero {
            text-align: center; margin-bottom: 30px; animation: bounceIn 1.2s ease;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(8px);
            padding: 20px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.3);
        }

        .branding-hero h1 {
            font-weight: 800; font-size: 4.5rem; color: #fff;
            text-shadow: 4px 4px 0px var(--growth-green), 6px 6px 15px rgba(0,0,0,0.4);
            margin-bottom: 5px;
        }

        .branding-hero p {
            font-weight: 800; color: #fff; background: var(--energy-orange);
            display: inline-block; padding: 8px 25px; border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); letter-spacing: 1px;
        }

        .vibrant-card {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border-radius: 35px; padding: 35px; margin-bottom: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 4px solid transparent; transition: 0.4s;
        }

        .vibrant-card:hover { border-color: var(--prosperity-gold); transform: translateY(-5px); }

        .step-badge {
            display: inline-block; padding: 10px 25px; border-radius: 50px;
            font-weight: 800; color: white; margin-bottom: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); letter-spacing: 1px;
        }

        .bg-blue { background: linear-gradient(45deg, #2563eb, #3b82f6); }
        .bg-purple { background: linear-gradient(45deg, #7c3aed, #a855f7); }
        .bg-pink { background: linear-gradient(45deg, #db2777, #ec4899); }
        .bg-amber { background: linear-gradient(45deg, #d97706, #f59e0b); }
        .bg-red { background: linear-gradient(45deg, #dc2626, #ef4444); }

        .form-control, .form-select { border: 2px solid #cbd5e1; border-radius: 15px; padding: 12px; font-weight: 600; }
        .form-control:focus { border-color: var(--growth-green); box-shadow: 0 0 0 4px rgba(21, 128, 61, 0.2); }

        /* Sourcing Profile MCQ Buttons */
        .profile-label {
            padding: 12px 20px; border-radius: 50px; border: 2px solid #cbd5e1;
            cursor: pointer; font-weight: 700; transition: 0.3s; background: #fff; font-size: 0.95rem;
        }
        .chk-imported:checked + .profile-label { background: var(--growth-green); color: white; border-color: var(--prosperity-gold); box-shadow: 0 5px 15px rgba(21, 128, 61, 0.3);}
        .chk-local:checked + .profile-label { background: #ef4444; color: white; border-color: #991b1b; }

        /* Pulse Pills */
        .p-label {
            padding: 12px 25px; border-radius: 20px; border: 3px solid #cbd5e1; margin: 5px;
            display: inline-block; cursor: pointer; font-weight: 800; background: #fff; transition: 0.3s;
        }
        .p-check:checked + .p-label { background: var(--growth-green); color: white; border-color: var(--prosperity-gold); transform: translateY(-3px); }

        .btn-success-sync {
            background: linear-gradient(45deg, #15803d, #22c55e); color: white; font-weight: 800;
            font-size: 1.8rem; padding: 25px; border-radius: 30px; border: none; width: 100%;
            box-shadow: 0 20px 40px rgba(21, 128, 61, 0.5); transition: 0.4s; animation: pulse-glow 2s infinite;
        }
        .btn-success-sync:hover { transform: scale(1.02); }

        @keyframes pulse-glow {
            0% { box-shadow: 0 10px 20px rgba(21, 128, 61, 0.5); }
            50% { box-shadow: 0 20px 50px rgba(21, 128, 61, 0.8); }
            100% { box-shadow: 0 10px 20px rgba(21, 128, 61, 0.5); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3) translateY(-100px); }
            70% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-animation" id="bg-items"></div>

<div class="main-container">
    <div class="branding-hero">
        <h1>AYURA EXIM</h1>
        <p>🚜 SOURCING INTELLIGENCE 🚜</p>
    </div>

    <form id="sourcingForm">
        <!-- 01. Identity & MCQ -->
        <div class="vibrant-card">
            <span class="step-badge bg-blue">01. MILL IDENTITY & PROFILE</span>
            <div class="row g-4">
                <div class="col-md-7">
                    <label class="form-label fw-bold">Dal Mill Name</label>
                    <input type="text" name="millName" class="form-control" placeholder="Company Name" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-bold">WhatsApp Number</label>
                    <input type="tel" name="whatsapp" class="form-control" placeholder="+91" required>
                </div>
            </div>
            
            <hr class="mt-4 border-2 border-secondary">
            
            <!-- THE MCQ LOGIC -->
            <div class="mt-3">
                <label class="form-label fw-bold text-dark mb-3">SOURCING PROFILE (Select applicable)</label>
                <div class="d-flex flex-wrap gap-2">
                    <input type="checkbox" id="chkImported" class="d-none profile-chk chk-imported">
                    <label for="chkImported" class="profile-label">🌍 Deals in Imported Raw Material</label>
                    
                    <input type="checkbox" id="chkBuyUs" name="buyFromUs" class="d-none profile-chk chk-imported">
                    <label for="chkBuyUs" class="profile-label">🤝 Willing to Buy From Us</label>
                    
                    <input type="checkbox" id="chkLocal" class="d-none profile-chk chk-local">
                    <label for="chkLocal" class="profile-label">🚜 Only Buys Local (Skip Extra Fields)</label>
                </div>
            </div>
        </div>

        <!-- EXTENDED FORM (Hidden by default, shown via MCQ) -->
        <div id="extendedForm" style="display: none;">
            
            <!-- 02. Market Intel -->
            <div class="vibrant-card">
                <span class="step-badge bg-purple">02. MARKET INTELLIGENCE</span>
                <p class="text-muted small fw-bold mb-3">Select commodities to enter Retail Dal Rates and Whole Raw Rates:</p>
                <div class="text-center">
                    <input type="checkbox" class="p-check d-none p-opt" id="tur" value="tur">
                    <label class="p-label" for="tur">Tur</label>
                    <input type="checkbox" class="p-check d-none p-opt" id="chana" value="chana">
                    <label class="p-label" for="chana">Chana</label>
                    <input type="checkbox" class="p-check d-none p-opt" id="moong" value="moong">
                    <label class="p-label" for="moong">Moong</label>
                    <input type="checkbox" class="p-check d-none p-opt" id="urad" value="urad">
                    <label class="p-label" for="urad">Urad</label>
                    <input type="checkbox" class="p-check d-none p-opt" id="masoor" value="masoor">
                    <label class="p-label" for="masoor">Masoor</label>
                </div>
                <div id="rateInputsContainer"></div>
            </div>

            <!-- 03. Source Logistics -->
            <div class="vibrant-card">
                <span class="step-badge bg-pink">03. LOGISTICS & SOURCE</span>
                <div class="row g-4">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Quality Grade</label>
                        <select name="quality" class="form-select">
                            <option value="">Select Grade...</option>
                            <option value="A">Grade A (Premium)</option>
                            <option value="B">Grade B (Standard)</option>
                            <option value="C">Grade C (Industrial)</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Origin Country</label>
                        <input type="text" name="country" class="form-control" placeholder="e.g. India">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">State / Region</label>
                        <input type="text" name="state" class="form-control" placeholder="e.g. Maharashtra">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Supplier Name (If Shared)</label>
                        <input type="text" name="supplierName" class="form-control" placeholder="Supplier...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Monthly Procurement (MT)</label>
                        <input type="number" name="monthlyReq" class="form-control" placeholder="Qty">
                    </div>
                </div>
            </div>

            <!-- 04. Business Potential -->
            <div class="vibrant-card">
                <span class="step-badge bg-amber">04. BUSINESS POTENTIAL</span>
                <div class="row g-4">
                    <div class="col-md-6 border-end border-2">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" name="exportSupply" id="bp2">
                            <label class="form-label ms-2" for="bp2">Supply for Our Export?</label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="retailSupply" id="bp3">
                            <label class="form-label ms-2" for="bp3">Local Retail Supply?</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Monthly Processing Cap (MT)</label>
                        <input type="number" name="monthlyCap" class="form-control" placeholder="Max Capacity">
                    </div>
                </div>
            </div>
        </div> <!-- End of Extended Form -->

        <!-- 05. Status (Always visible) -->
        <div class="vibrant-card">
            <span class="step-badge bg-red">05. ACTION & STATUS</span>
            <div class="row g-4">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Current Status</label>
                    <select name="status" class="form-select">
                        <option>🔥 High Potential</option>
                        <option>⏳ In Discussion</option>
                        <option>❌ Only Buys Local</option>
                        <option>✅ Closed / Deal</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Next Action</label>
                    <input type="text" name="nextAction" class="form-control" placeholder="e.g. Send Samples">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Follow-up Date</label>
                    <input type="date" name="followUpDate" class="form-control">
                </div>
                <div class="col-12">
                    <textarea name="remarks" class="form-control" rows="3" placeholder="Additional strategic notes..."></textarea>
                </div>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-success-sync">🚀 SYNC PROSPERITY</button>
    </form>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbzg3lDLkTtQp8dcRYLmdohne_EFxU1ft1ofM-_wmt_Tf4_KLLsd88LITZFE4r9qwcc4/exec"; // PASTE URL HERE

    // Dynamic background floating
    const icons = ['🌾', '🚜', '💰', '🏗️', '🌱', '🚚'];
    const bg = document.getElementById('bg-items');
    for(let i=0; i<15; i++) {
        let span = document.createElement('span');
        span.className = 'floating-item';
        span.innerText = icons[Math.floor(Math.random()*icons.length)];
        span.style.left = Math.random()*100 + '%';
        span.style.animationDelay = Math.random()*15 + 's';
        bg.appendChild(span);
    }

    // --- NEW: MCQ Logic Toggle ---
    document.querySelectorAll('.profile-chk').forEach(chk => {
        chk.addEventListener('change', () => {
            const isImported = document.getElementById('chkImported').checked;
            const isBuyUs = document.getElementById('chkBuyUs').checked;
            const isLocal = document.getElementById('chkLocal').checked;
            const extra = document.getElementById('extendedForm');
            
            // Logic to uncheck conflicts
            if (chk.id === 'chkLocal' && isLocal) {
                document.getElementById('chkImported').checked = false;
                document.getElementById('chkBuyUs').checked = false;
            } else if ((chk.id === 'chkImported' || chk.id === 'chkBuyUs') && (isImported || isBuyUs)) {
                document.getElementById('chkLocal').checked = false;
            }

            // Show/Hide complex fields
            if (document.getElementById('chkImported').checked || document.getElementById('chkBuyUs').checked) {
                extra.style.display = 'block';
                extra.style.animation = 'bounceIn 0.8s ease';
            } else {
                extra.style.display = 'none';
            }
        });
    });

    // --- NEW: Creates Both Retail & Whole Rates for Excel Columns ---
    document.querySelectorAll('.p-opt').forEach(cb => {
        cb.addEventListener('change', () => {
            const container = document.getElementById('rateInputsContainer');
            container.innerHTML = "";
            const selected = document.querySelectorAll('.p-opt:checked');
            if(selected.length > 0) {
                selected.forEach(checked => {
                    const val = checked.value; 
                    const title = val.charAt(0).toUpperCase() + val.slice(1);
                    const div = document.createElement('div');
                    div.className = "p-3 rounded-4 row g-3 mt-3 shadow-sm border border-success border-2";
                    div.style.background = "rgba(21, 128, 61, 0.05)";
                    div.innerHTML = `
                        <div class="col-12"><h6 class="fw-bold text-success mb-0 border-bottom pb-2 border-success-subtle">${title} Rates</h6></div>
                        <div class="col-md-6">
                            <label class="form-label text-dark fw-bold small">Retail Dal (₹/Qtl)</label>
                            <input type="number" name="${val}Dal" class="form-control" placeholder="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-warning-emphasis fw-bold small">Whole Raw (₹/Qtl)</label>
                            <input type="number" name="${val}Whole" class="form-control" placeholder="0">
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
        });
    });

    // Submit logic
    document.getElementById('sourcingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "🚀 UPLOADING...";

        const fd = new FormData(this);
        const payload = Object.fromEntries(fd.entries());
        
        // Explicitly capture checkboxes in case they are unchecked (FormData ignores them otherwise)
        payload.buyFromUs = document.getElementById('chkBuyUs').checked;
        payload.exportSupply = document.getElementById('bp2').checked;
        payload.retailSupply = document.getElementById('bp3').checked;

        fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 }, colors: ['#15803d', '#fbbf24', '#f97316', '#ffffff'] });
            alert("Entry Saved! Data is now perfectly aligned with your Excel Sheet.");
            this.reset();
            document.getElementById('rateInputsContainer').innerHTML = "";
            document.getElementById('extendedForm').style.display = 'none'; // reset view
        }).finally(() => {
            btn.disabled = false; btn.innerText = "🚀 SYNC PROSPERITY";
        });
    });
</script>
</body>
</html>
