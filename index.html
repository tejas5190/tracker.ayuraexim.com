<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayura Exim | Prosperity Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --growth-green: #15803d;
            --prosperity-gold: #fbbf24;
            --energy-orange: #f97316;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-dark: #0f172a;
        }

        body { 
            background: url('https://static.vecteezy.com/system/resources/previews/029/300/314/large_2x/tractor-spraying-pesticides-on-soybean-field-with-sprayer-at-spring-free-photo.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif; 
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Fun Floating Icons */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-item {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.2;
            animation: floatUp 15s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .main-container { max-width: 900px; margin: auto; padding-top: 20px; }

        .branding-hero {
            text-align: center;
            margin-bottom: 30px;
            animation: bounceIn 1.2s ease;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .branding-hero h1 {
            font-weight: 800;
            font-size: 4.5rem;
            color: #fff;
            text-shadow: 4px 4px 0px var(--growth-green), 6px 6px 15px rgba(0,0,0,0.4);
            margin-bottom: 5px;
        }

        .branding-hero p {
            font-weight: 800;
            color: #fff;
            background: var(--energy-orange);
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }

        /* Glass Cards - Lively & Punchy */
        .vibrant-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 35px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 4px solid transparent;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .vibrant-card:hover {
            border-color: var(--prosperity-gold);
            transform: translateY(-10px) scale(1.01);
        }

        .step-badge {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 800;
            color: white;
            margin-bottom: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bg-blue { background: linear-gradient(45deg, #2563eb, #3b82f6); }
        .bg-purple { background: linear-gradient(45deg, #7c3aed, #a855f7); }
        .bg-pink { background: linear-gradient(45deg, #db2777, #ec4899); }
        .bg-amber { background: linear-gradient(45deg, #d97706, #f59e0b); }

        .form-label { font-size: 1.1rem; }

        .form-control, .form-select {
            border: 2px solid #cbd5e1;
            border-radius: 18px;
            padding: 15px;
            font-weight: 600;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--growth-green);
            box-shadow: 0 0 0 6px rgba(21, 128, 61, 0.2);
        }

        /* Submit Button - Extreme Energy */
        .btn-success-sync {
            background: linear-gradient(45deg, #15803d, #22c55e);
            color: white;
            font-weight: 800;
            font-size: 1.8rem;
            padding: 25px;
            border-radius: 30px;
            border: none;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 20px 40px rgba(21, 128, 61, 0.5);
            transition: 0.4s;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 20px 40px rgba(21, 128, 61, 0.5); }
            50% { transform: scale(1.02); box-shadow: 0 20px 60px rgba(21, 128, 61, 0.8); }
            100% { transform: scale(1); box-shadow: 0 20px 40px rgba(21, 128, 61, 0.5); }
        }

        .p-label {
            padding: 15px 30px;
            border-radius: 20px;
            border: 3px solid #cbd5e1;
            margin: 8px;
            display: inline-block;
            cursor: pointer;
            font-weight: 800;
            background: #fff;
            transition: 0.3s;
        }

        .p-check:checked + .p-label {
            background: var(--growth-green);
            color: white;
            border-color: var(--prosperity-gold);
            transform: translateY(-5px);
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3) translateY(-100px); }
            70% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-animation" id="bg-items"></div>

<div class="main-container">
    <div class="branding-hero">
        <h1>AYURA EXIM</h1>
        <p>🚜 HARVESTING SUCCESS & PROSPERITY 🚜</p>
    </div>

    <form id="sourcingForm">
        <!-- 01. Identity -->
        <div class="vibrant-card">
            <span class="step-badge bg-blue">01. MILL IDENTITY</span>
            <div class="row g-4">
                <div class="col-md-7">
                    <label class="form-label fw-bold">Dal Mill Name</label>
                    <input type="text" name="millName" class="form-control" placeholder="Company Name" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-bold">WhatsApp Number</label>
                    <input type="tel" name="whatsapp" class="form-control" placeholder="+91" required>
                </div>
            </div>
        </div>

        <!-- 02. Market Intel -->
        <div class="vibrant-card">
            <span class="step-badge bg-purple">02. MARKET INTELLIGENCE</span>
            <div class="text-center">
                <input type="checkbox" class="p-check d-none p-opt" id="tur" value="Tur">
                <label class="p-label" for="tur">Tur</label>
                <input type="checkbox" class="p-check d-none p-opt" id="chana" value="Chana">
                <label class="p-label" for="chana">Chana</label>
                <input type="checkbox" class="p-check d-none p-opt" id="moong" value="Moong">
                <label class="p-label" for="moong">Moong</label>
                <input type="checkbox" class="p-check d-none p-opt" id="urad" value="Urad">
                <label class="p-label" for="urad">Urad</label>
            </div>
            <div id="rateInputsContainer"></div>
        </div>

        <!-- 03. Logistics -->
        <div class="vibrant-card">
            <span class="step-badge bg-pink">03. LOGISTICS & CAPACITY</span>
            <div class="row g-4">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Origin Country</label>
                    <input type="text" name="country" class="form-control" placeholder="e.g. India">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Procurement (MT)</label>
                    <input type="number" name="monthlyReq" class="form-control" placeholder="Qty">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Monthly Cap (MT)</label>
                    <input type="number" name="monthlyCap" class="form-control" placeholder="Capacity">
                </div>
            </div>
        </div>

        <!-- 04. Status -->
        <div class="vibrant-card">
            <span class="step-badge bg-amber">04. ACTION STATUS</span>
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Current Status</label>
                    <select name="status" class="form-select">
                        <option>🔥 High Potential</option>
                        <option>⏳ In Discussion</option>
                        <option>✅ Closed / Deal</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Follow-up Date</label>
                    <input type="date" name="followUpDate" class="form-control">
                </div>
                <div class="col-12">
                    <textarea name="remarks" class="form-control" rows="3" placeholder="Additional notes..."></textarea>
                </div>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-success-sync">🚀 SYNC PROSPERITY</button>
    </form>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbzg3lDLkTtQp8dcRYLmdohne_EFxU1ft1ofM-_wmt_Tf4_KLLsd88LITZFE4r9qwcc4/exec";

    // Dynamic background floating
    const icons = ['🌾', '🚜', '💰', '🏗️', '🌱', '🚚'];
    const bg = document.getElementById('bg-items');
    for(let i=0; i<15; i++) {
        let span = document.createElement('span');
        span.className = 'floating-item';
        span.innerText = icons[Math.floor(Math.random()*icons.length)];
        span.style.left = Math.random()*100 + '%';
        span.style.animationDelay = Math.random()*15 + 's';
        bg.appendChild(span);
    }

    // Rate inputs
    document.querySelectorAll('.p-opt').forEach(cb => {
        cb.addEventListener('change', () => {
            const container = document.getElementById('rateInputsContainer');
            container.innerHTML = "";
            const selected = document.querySelectorAll('.p-opt:checked');
            if(selected.length > 0) {
                const div = document.createElement('div');
                div.className = "p-4 rounded-4 row g-3 mt-3 shadow-inner";
                div.style.background = "rgba(21, 128, 61, 0.1)";
                selected.forEach(checked => {
                    div.innerHTML += `<div class="col-md-6"><label class="form-label fw-bold text-success">${checked.value} Rate (₹/Qtl)</label><input type="number" class="form-control r-val" data-p="${checked.value}"></div>`;
                });
                container.appendChild(div);
            }
        });
    });

    // Form logic
    document.getElementById('sourcingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "🚀 UPLOADING...";

        const fd = new FormData(this);
        const payload = Object.fromEntries(fd.entries());
        const rates = {};
        document.querySelectorAll('.r-val').forEach(i => rates[i.dataset.p] = i.value);
        payload.rates = rates;
        payload.pulses = Object.keys(rates).join(", ");

        fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            confetti({
                particleCount: 200,
                spread: 90,
                origin: { y: 0.6 },
                colors: ['#15803d', '#fbbf24', '#f97316', '#ffffff']
            });
            alert("Entry Saved! Data is now in your Google Sheet.");
            this.reset();
            document.getElementById('rateInputsContainer').innerHTML = "";
        }).finally(() => {
            btn.disabled = false; btn.innerText = "🚀 SYNC PROSPERITY";
        });
    });
</script>
</body>
</html>
