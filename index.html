<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayura Exim | Success Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --growth-green: #22c55e;
            --prosperity-gold: #fbbf24;
            --energy-orange: #f97316;
            --clean-white: #ffffff;
            --soft-sky: #f0f9ff;
            --text-dark: #0f172a;
        }

        body { 
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            font-family: 'Outfit', sans-serif; 
            color: var(--text-dark);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .main-container { max-width: 900px; margin: auto; }

        /* Feng Shui Branding Header */
        .branding-hero {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        .branding-hero h1 {
            font-weight: 800;
            font-size: 3.5rem;
            color: var(--growth-green);
            text-shadow: 2px 2px 0px var(--prosperity-gold);
            margin-bottom: 5px;
        }

        .branding-hero p {
            font-weight: 600;
            color: var(--energy-orange);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Punchy Colorful Cards */
        .vibrant-card {
            background: var(--clean-white);
            border-radius: 30px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .vibrant-card:hover {
            transform: scale(1.02);
            border-color: var(--growth-green);
        }

        .step-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.75rem;
            margin-bottom: 15px;
            color: white;
        }

        .bg-step-1 { background: #3b82f6; } /* Sky Blue */
        .bg-step-2 { background: #8b5cf6; } /* Violet */
        .bg-step-3 { background: #ec4899; } /* Pink */
        .bg-step-4 { background: #f59e0b; } /* Amber */

        .form-label { font-weight: 700; color: #475569; margin-bottom: 10px; }

        .form-control, .form-select {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 14px 18px;
            border-radius: 15px;
            font-weight: 500;
            transition: 0.3s;
        }

        .form-control:focus {
            background: white;
            border-color: var(--growth-green);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
        }

        /* Punchy Pills */
        .pulse-chip { display: none; }
        .pulse-label {
            padding: 12px 25px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            margin: 5px;
            color: #64748b;
        }

        .pulse-chip:checked + .pulse-label {
            background: var(--growth-green);
            color: white;
            border-color: var(--growth-green);
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
        }

        /* High Energy Submit Button */
        .btn-punchy {
            background: linear-gradient(45deg, #22c55e, #10b981);
            color: white;
            font-weight: 800;
            font-size: 1.3rem;
            padding: 20px;
            border-radius: 20px;
            border: none;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 15px 30px rgba(34, 197, 94, 0.3);
            transition: 0.3s;
        }

        .btn-punchy:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(34, 197, 94, 0.4);
        }

        .rate-container {
            background: #f0fdf4;
            border: 2px dashed #bbf7d0;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="branding-hero">
        <h1>AYURA EXIM</h1>
        <p>✨ Growth • Prosperity • Supply Chain ✨</p>
    </div>

    <form id="sourcingForm">
        <!-- Section 1 -->
        <div class="vibrant-card">
            <span class="step-badge bg-step-1">GROWTH PARTNER IDENTITY</span>
            <div class="row g-3">
                <div class="col-md-7">
                    <label class="form-label">Mill / Company Name</label>
                    <input type="text" name="millName" class="form-control" placeholder="Enter name..." required>
                </div>
                <div class="col-md-5">
                    <label class="form-label">WhatsApp Contact</label>
                    <input type="tel" name="whatsapp" class="form-control" placeholder="+91" required>
                </div>
            </div>
        </div>

        <!-- Section 2 -->
        <div class="vibrant-card">
            <span class="step-badge bg-step-2">MARKET INTELLIGENCE</span>
            <div class="mb-3">
                <label class="form-label d-block">Select Commodities</label>
                <input type="checkbox" class="pulse-chip p-opt" id="tur" value="Tur">
                <label class="pulse-label" for="tur">Tur</label>
                <input type="checkbox" class="pulse-chip p-opt" id="chana" value="Chana">
                <label class="pulse-label" for="chana">Chana</label>
                <input type="checkbox" class="pulse-chip p-opt" id="moong" value="Moong">
                <label class="pulse-label" for="moong">Moong</label>
                <input type="checkbox" class="pulse-chip p-opt" id="urad" value="Urad">
                <label class="pulse-label" for="urad">Urad</label>
            </div>
            <div id="rateInputsContainer"></div>
        </div>

        <!-- Section 3 -->
        <div class="vibrant-card">
            <span class="step-badge bg-step-3">GLOBAL SOURCING DETAILS</span>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Source Country</label>
                    <input type="text" name="country" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">State / Region</label>
                    <input type="text" name="state" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Monthly Procurement (MT)</label>
                    <input type="number" name="monthlyReq" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Supplier Name</label>
                    <input type="text" name="supplierName" class="form-control" placeholder="If shared...">
                </div>
            </div>
        </div>

        <!-- Section 4 -->
        <div class="vibrant-card">
            <span class="step-badge bg-step-4">COMMERCIAL SUCCESS</span>
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" name="buyFromUs" id="bp1">
                        <label class="form-label ms-2" for="bp1">Buy Raw Material from us?</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Processing Capacity (MT)</label>
                    <input type="number" name="monthlyCap" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Current Status</label>
                    <select name="status" class="form-select">
                        <option>Strong Interest</option>
                        <option>Awaiting Response</option>
                        <option>Closed</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Follow-up Date</label>
                    <input type="date" name="followUpDate" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Remarks</label>
                    <textarea name="remarks" class="form-control" rows="3"></textarea>
                </div>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-punchy">🚀 SYNC DATA TO CLOUD</button>
    </form>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbzg3lDLkTtQp8dcRYLmdohne_EFxU1ft1ofM-_wmt_Tf4_KLLsd88LITZFE4r9qwcc4/exec";

    document.querySelectorAll('.p-opt').forEach(cb => {
        cb.addEventListener('change', () => {
            const container = document.getElementById('rateInputsContainer');
            container.innerHTML = "";
            const selected = document.querySelectorAll('.p-opt:checked');
            if(selected.length > 0) {
                const div = document.createElement('div');
                div.className = "rate-container row g-3";
                selected.forEach(checked => {
                    div.innerHTML += `<div class="col-md-6"><label class="form-label fw-bold text-success">${checked.value} Rate (₹/Qtl)</label><input type="number" class="form-control r-val" data-p="${checked.value}"></div>`;
                });
                container.appendChild(div);
            }
        });
    });

    document.getElementById('sourcingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "SAVING PROSPERITY...";

        const formData = new FormData(this);
        const payload = Object.fromEntries(formData.entries());
        const rates = {};
        document.querySelectorAll('.r-val').forEach(i => rates[i.dataset.p] = i.value);
        payload.rates = rates;
        payload.pulses = Object.keys(rates).join(", ");
        payload.buyFromUs = document.getElementById('bp1').checked;

        fetch(APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            alert("✅ Data successfully saved!");
            this.reset();
            document.getElementById('rateInputsContainer').innerHTML = "";
        }).finally(() => {
            btn.disabled = false; btn.innerText = "🚀 SYNC DATA TO CLOUD";
        });
    });
</script>
</body>
</html>
