<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayura Exim | Prosperity Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --growth-green: #15803d;
            --prosperity-gold: #fbbf24;
            --energy-orange: #f97316;
            --glass-bg: rgba(255, 255, 255, 0.78); 
            --text-dark: #0f172a;
        }

        body { 
            background: url('bg-farm.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif; 
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .floating-item {
            position: absolute; font-size: 2.5rem; opacity: 0.25;
            animation: floatUp 15s linear infinite;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .main-container { max-width: 900px; margin: auto; padding-top: 20px; }

        .branding-hero {
            text-align: center; margin-bottom: 30px; animation: bounceIn 1.2s ease;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(8px);
            padding: 20px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .branding-hero h1 {
            font-weight: 800; font-size: 4.5rem; color: #fff;
            text-shadow: 3px 3px 0px var(--growth-green), 5px 5px 15px rgba(0,0,0,0.6);
            margin-bottom: 5px;
        }

        .branding-hero p {
            font-weight: 800; color: #fff; background: var(--energy-orange);
            display: inline-block; padding: 8px 25px; border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); letter-spacing: 1px;
        }

        .vibrant-card {
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border-radius: 35px; padding: 35px; margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255,255,255,0.6); transition: 0.4s;
        }

        .vibrant-card:hover { border-color: var(--prosperity-gold); transform: translateY(-5px); }

        .step-badge {
            display: inline-block; padding: 10px 25px; border-radius: 50px;
            font-weight: 800; color: white; margin-bottom: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2); letter-spacing: 1px;
        }

        .bg-blue { background: linear-gradient(45deg, #2563eb, #3b82f6); }
        .bg-purple { background: linear-gradient(45deg, #7c3aed, #a855f7); }
        .bg-pink { background: linear-gradient(45deg, #db2777, #ec4899); }
        .bg-amber { background: linear-gradient(45deg, #d97706, #f59e0b); }
        .bg-red { background: linear-gradient(45deg, #dc2626, #ef4444); }

        .form-control, .form-select { 
            border: 2px solid #cbd5e1; border-radius: 15px; padding: 12px; 
            font-weight: 600; background: rgba(255,255,255,0.9); 
        }
        .form-control:focus { border-color: var(--growth-green); box-shadow: 0 0 0 4px rgba(21, 128, 61, 0.3); }

        .profile-label {
            padding: 12px 20px; border-radius: 50px; border: 2px solid #cbd5e1;
            cursor: pointer; font-weight: 800; transition: 0.3s; background: rgba(255,255,255,0.9);
        }
        .chk-imported:checked + .profile-label { background: var(--growth-green); color: white; border-color: var(--prosperity-gold); }
        .chk-local:checked + .profile-label { background: #ef4444; color: white; border-color: #991b1b; }

        .p-label {
            padding: 12px 25px; border-radius: 20px; border: 3px solid #cbd5e1; margin: 5px;
            display: inline-block; cursor: pointer; font-weight: 800; background: rgba(255,255,255,0.9);
        }
        .p-check:checked + .p-label { background: var(--growth-green); color: white; border-color: var(--prosperity-gold); }

        .btn-success-sync {
            background: linear-gradient(45deg, #15803d, #22c55e); color: white; font-weight: 800;
            font-size: 1.8rem; padding: 25px; border-radius: 30px; width: 100%;
            box-shadow: 0 20px 40px rgba(21, 128, 61, 0.6); transition: 0.4s; animation: pulse-glow 2s infinite;
            border: none;
        }

        #historyBox {
            background: rgba(21, 128, 61, 0.1);
            border-left: 5px solid var(--growth-green);
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            display: none;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 10px 20px rgba(21, 128, 61, 0.5); }
            50% { box-shadow: 0 20px 50px rgba(21, 128, 61, 0.8); }
            100% { box-shadow: 0 10px 20px rgba(21, 128, 61, 0.5); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3) translateY(-100px); }
            70% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-animation" id="bg-items"></div>

<div class="main-container">
    <div class="branding-hero">
        <h1>AYURA EXIM</h1>
        <p>🚜 SOURCING INTELLIGENCE 🚜</p>
    </div>

    <form id="sourcingForm">
        <!-- 01. Identity & MCQ -->
        <div class="vibrant-card">
            <span class="step-badge bg-blue">01. MILL IDENTITY & PROFILE</span>
            <div class="row g-4">
                <div class="col-md-7">
                    <label class="form-label fw-bold">Select Dal Mill</label>
                    <input list="millList" name="millName" id="millInput" class="form-control" placeholder="Type name or add new..." required autocomplete="off">
                    <datalist id="millList"></datalist>
                    
                    <div id="historyBox">
                        <span class="fw-bold text-success">📜 PREVIOUS REMARKS:</span><br>
                        <span id="prevRemarks" class="text-dark small"></span>
                    </div>
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-bold">WhatsApp Number</label>
                    <input type="tel" name="whatsapp" class="form-control" placeholder="+91" required>
                </div>
            </div>
            
            <hr class="mt-4 mb-4 border-2 border-secondary">
            
            <div>
                <label class="form-label fw-bold text-dark mb-3 fs-5">SOURCING PROFILE</label>
                <div class="d-flex flex-wrap gap-2">
                    <input type="checkbox" id="chkImported" class="d-none profile-chk chk-imported">
                    <label for="chkImported" class="profile-label">🌍 Deals in Imported</label>
                    
                    <input type="checkbox" id="chkBuyUs" name="buyFromUs" class="d-none profile-chk chk-imported">
                    <label for="chkBuyUs" class="profile-label">🤝 Buy From Us</label>
                    
                    <input type="checkbox" id="chkLocal" class="d-none profile-chk chk-local">
                    <label for="chkLocal" class="profile-label">🚜 Only Buys Local</label>
                </div>
            </div>
        </div>

        <!-- 02. Market Intel -->
        <div class="vibrant-card">
            <span class="step-badge bg-purple">02. MARKET INTELLIGENCE & RATES</span>
            <p class="text-dark small fw-bold mb-3">Select commodities to enter Rates:</p>
            <div class="text-center">
                <input type="checkbox" class="p-check d-none p-opt" id="tur" value="tur">
                <label class="p-label" for="tur">Tur</label>
                <input type="checkbox" class="p-check d-none p-opt" id="chana" value="chana">
                <label class="p-label" for="chana">Chana</label>
                <input type="checkbox" class="p-check d-none p-opt" id="moong" value="moong">
                <label class="p-label" for="moong">Moong</label>
                <input type="checkbox" class="p-check d-none p-opt" id="urad" value="urad">
                <label class="p-label" for="urad">Urad</label>
                <input type="checkbox" class="p-check d-none p-opt" id="masoor" value="masoor">
                <label class="p-label" for="masoor">Masoor</label>
            </div>
            <div id="rateInputsContainer"></div>
        </div>

        <!-- 03. Raw Material Logistics -->
        <div class="vibrant-card">
            <span class="step-badge bg-pink">03. RAW MATERIAL LOGISTICS</span>
            <div class="row g-4">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Quality Grade</label>
                    <select name="quality" class="form-select">
                        <option value="">Select...</option>
                        <option value="A">Grade A</option>
                        <option value="B">Grade B</option>
                        <option value="C">Grade C</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Origin Country</label>
                    <input type="text" name="country" class="form-control" placeholder="e.g. India">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Procurement (MT)</label>
                    <input type="number" name="monthlyReq" class="form-control">
                </div>
            </div>
        </div>

        <!-- 04. Business Potential -->
        <div class="vibrant-card">
            <span class="step-badge bg-amber">04. BUSINESS POTENTIAL</span>
            <div class="row g-4">
                <div class="col-md-6 border-end border-2 border-secondary-subtle">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input fs-4" type="checkbox" name="exportSupply" id="bp2">
                        <label class="form-label ms-2 mt-1 fw-bold" for="bp2">Supply for Export?</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Processing Cap (MT)</label>
                    <input type="number" name="monthlyCap" class="form-control">
                </div>
            </div>
        </div>

        <!-- 05. Status -->
        <div class="vibrant-card">
            <span class="step-badge bg-red">05. ACTION & STATUS</span>
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Current Status</label>
                    <select name="status" class="form-select" required>
                        <option value="New Lead">🔥 New Lead</option>
                        <option value="In Discussion">⏳ In Discussion</option>
                        <option value="Follow-up Later">📅 Follow-up Later</option>
                        <option value="Closed / Interested">✅ Closed / Interested</option>
                        <option value="Not Interested">❌ Not Interested</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Follow-up Date</label>
                    <input type="date" name="followUpDate" class="form-control">
                </div>
                <div class="col-12">
                    <textarea name="remarks" class="form-control" rows="3" placeholder="Add conversation details here..."></textarea>
                </div>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-success-sync">🚀 SYNC PROSPERITY</button>
    </form>
</div>

<script>
    const PROSPERITY_URL = "https://script.google.com/macros/s/AKfycbzg3lDLkTtQp8dcRYLmdohne_EFxU1ft1ofM-_wmt_Tf4_KLLsd88LITZFE4r9qwcc4/exec"; 
    let millData = [];

    // Background Floating
    const icons = ['🌾', '🚜', '💰', '🏗️', '🌱', '🚚'];
    const bg = document.getElementById('bg-items');
    for(let i=0; i<18; i++) {
        let span = document.createElement('span');
        span.className = 'floating-item';
        span.innerText = icons[Math.floor(Math.random()*icons.length)];
        span.style.left = Math.random()*100 + '%';
        span.style.animationDelay = Math.random()*15 + 's';
        bg.appendChild(span);
    }

    // LOAD AVAILABLE MILLS
    window.onload = function() {
        fetch(PROSPERITY_URL)
        .then(res => res.json())
        .then(data => {
            millData = data;
            const list = document.getElementById('millList');
            data.forEach(mill => {
                let opt = document.createElement('option');
                opt.value = mill.name;
                list.appendChild(opt);
            });
        });
    };

    // SEARCH LOGIC & AUTOFILL
    document.getElementById('millInput').addEventListener('input', function() {
        const match = millData.find(m => m.name === this.value);
        if (match) {
            document.getElementsByName('whatsapp')[0].value = match.phone || "";
            if (match.history) {
                document.getElementById('historyBox').style.display = 'block';
                document.getElementById('prevRemarks').innerText = match.history;
            }
        } else {
            document.getElementById('historyBox').style.display = 'none';
        }
    });

    // MCQ PROFILE LOGIC
    document.querySelectorAll('.profile-chk').forEach(chk => {
        chk.addEventListener('change', () => {
            if (chk.id === 'chkLocal' && chk.checked) {
                document.getElementById('chkImported').checked = false;
                document.getElementById('chkBuyUs').checked = false;
            } else if ((chk.id === 'chkImported' || chk.id === 'chkBuyUs') && chk.checked) {
                document.getElementById('chkLocal').checked = false;
            }
        });
    });

    // DYNAMIC RATES
    document.querySelectorAll('.p-opt').forEach(cb => {
        cb.addEventListener('change', () => {
            const container = document.getElementById('rateInputsContainer');
            container.innerHTML = "";
            document.querySelectorAll('.p-opt:checked').forEach(checked => {
                const val = checked.value; 
                const title = val.charAt(0).toUpperCase() + val.slice(1);
                const div = document.createElement('div');
                div.className = "p-3 rounded-4 row g-3 mt-3 border border-success border-2 bg-white shadow-sm";
                div.innerHTML = `
                    <div class="col-12"><h6 class="fw-bold text-success mb-0">${title} Rates</h6></div>
                    <div class="col-md-6"><label class="form-label small fw-bold">Retail Dal (₹)</label><input type="number" name="${val}Dal" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label small fw-bold">Whole Raw (₹)</label><input type="number" name="${val}Whole" class="form-control"></div>
                `;
                container.appendChild(div);
            });
        });
    });

    // SUBMISSION
    document.getElementById('sourcingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "🚀 SYNCING...";

        const fd = new FormData(this);
        const payload = Object.fromEntries(fd.entries());
        payload.buyFromUs = document.getElementById('chkBuyUs').checked;
        payload.exportSupply = document.getElementById('bp2').checked;

        fetch(PROSPERITY_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 }, colors: ['#15803d', '#fbbf24', '#f97316'] });
            alert("✅ Prosperity Synced! Lead status updated.");
            location.reload(); // Reload to refresh the Lead Queue list
        }).finally(() => {
            btn.disabled = false; btn.innerText = "🚀 SYNC PROSPERITY";
        });
    });
</script>
</body>
</html>
